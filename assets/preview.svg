    <text x="28" y="118" fill="#dce7ef" font-family="Menlo, monospace" font-size="21">location: /final-url</text>
    <text x="28" y="162" fill="#dce7ef" font-family="Menlo, monospace" font-size="21">cache-control: no-cache</text>
