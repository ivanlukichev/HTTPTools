<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="HTTPTools preview">
  <rect width="1200" height="630" fill="#0f141a"/>
  <circle cx="1020" cy="120" r="170" fill="#37d0c9" opacity="0.15"/>
  <circle cx="170" cy="520" r="220" fill="#6aa9ff" opacity="0.12"/>
