  <text x="120" y="160" fill="#37d0c9" font-family="Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="2">HTTP AND WEB UTILITIES</text>
  <text x="120" y="252" fill="#ffffff" font-family="Arial, sans-serif" font-size="72" font-weight="700">HTTPTools</text>
  <text x="120" y="310" fill="#d6e2ea" font-family="Arial, sans-serif" font-size="28">Check redirects, headers, and protocol details in seconds.</text>
